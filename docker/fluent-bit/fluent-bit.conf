[SERVICE]
    Flush         5
    Log_Level     info
    Parsers_File  /fluent-bit/etc/parsers.conf

[INPUT]
    Name              tail
    Path              /var/log/aichatbot/application.log
    Parser            json
    Tag               chatbot.backend
    Mem_Buf_Limit     10MB
    Skip_Long_Lines   On

[FILTER]
    Name                modify
    Match               chatbot.backend
    Add                 service aichatbotjava

[OUTPUT]
    Name                opensearch
    Match               chatbot.backend
    Host                opensearch
    Port                9200
    Index               chatbot-logs
    Suppress_Type_Name  On
    Generate_ID         On
    Logstash_Format     On
    Replace_Dots        On
