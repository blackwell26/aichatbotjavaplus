server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # CSP — tighten in production (Phase 9)
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' ws: wss:;" always;

    # ── Static assets: long-lived cache (content-hashed filenames) ────────────
    location ~* \.(js|css|woff2?|ttf|eot|svg|ico|png|jpg|jpeg|webp|gif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── index.html: never cache (always re-fetch on navigation) ───────────────
    location = /index.html {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # ── Health endpoint for Kubernetes/container liveness checks ──────────────
    location /health {
        access_log off;
        return 200 'OK';
        add_header Content-Type text/plain;
    }

    # ── Angular router: serve index.html for all unknown paths ────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Disable server tokens ─────────────────────────────────────────────────
    server_tokens off;
}
