global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'spring-backend'
    # Spring Boot app running on host; Docker default gateway is 172.17.0.1
    # On Linux, containers can reach the host via gateway IP
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['172.17.0.1:8080']

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
