app:
  environment: dev

# Development configuration: point to dev services (examples)
spring:
  datasource:
    url: jdbc:postgresql://postgres-dev:5432/aichatbot_dev
    username: aichatbot
  data:
    mongodb:
      uri: mongodb://mongodb-dev:27017/aichatbot_dev
  redis:
    host: redis-dev
    port: 6379
  kafka:
    bootstrap-servers: kafka-dev:9092

# Ollama dev runtime
spring:
  ai:
    ollama:
      url: "http://ollama-dev:11434"
      model: "llama3"

