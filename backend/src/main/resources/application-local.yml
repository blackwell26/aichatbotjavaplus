app:
  environment: local

# Local development datasource (Postgres), MongoDB, Redis, and Kafka
spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/aichatbot_local
    driver-class-name: org.postgresql.Driver
    username: aichatbot
    password: changeme
  data:
    mongodb:
      uri: mongodb://localhost:27017/aichatbot_local
  redis:
    host: localhost
    port: 6379
  kafka:
    bootstrap-servers: localhost:9092
  # Spring AI Ollama configuration (local development)
  ai:
    ollama:
      url: "http://localhost:11434"
      model: "llama3"
      timeout: 10s
      embedding-model: "nomic-embed-text"
  # Flyway: disable auto-migrate in local dev; migrations applied externally
  flyway:
    enabled: false

# Security: JWT configuration for local development (use weak secrets for dev only)
security:
  jwt:
    secret: local-dev-secret-change-in-prod
    expiration: 3600
    refresh-expiration: 604800
    issuer: aichatbot-local
    audience: aichatbot-users

# RAG: Retrieval-Augmented Generation for local development
rag:
  retrieval:
    enabled: true
    top-k: 5
    similarity-threshold: 0.5
    chunk-size: 500
    chunk-overlap: 100
    vector-db: pgvector

# External Service Integrations for local development (localhost endpoints)
integrations:
  product-service:
    enabled: true
    base-url: "http://localhost:9001"
    timeout: 5s
    api-key: "local-dev-key"
  order-service:
    enabled: true
    base-url: "http://localhost:9002"
    timeout: 5s
    api-key: "local-dev-key"
  payment-service:
    enabled: true
    base-url: "http://localhost:9003"
    timeout: 10s
    api-key: "local-dev-key"
  shipping-service:
    enabled: true
    base-url: "http://localhost:9004"
    timeout: 5s
    api-key: "local-dev-key"
  crm-service:
    enabled: true
    base-url: "http://localhost:9005"
    timeout: 5s
    api-key: "local-dev-key"

# Database and Messaging: Local development settings
datasources:
  postgresql:
    pool-size: 5
    max-idle-time: 30m
    connection-timeout: 30s
  mongodb:
    max-pool-size: 10
    connection-timeout: 10s
  redis:
    timeout: 5s
    pool-size: 4

messaging:
  kafka:
    producer-timeout: 10s
    consumer-timeout: 30s
    batch-size: 16384
    compression-type: snappy
  rabbitmq:
    enabled: false

# Observability: Local development (verbose logging, all metrics)
observability:
  metrics:
    enabled: true
    include-jvm-metrics: true
    include-system-metrics: true
    histogram-percentiles: "0.5,0.95,0.99"
  tracing:
    enabled: true
    sample-rate: 1.0  # 100% sampling for dev
    exporter: jaeger
  logging:
    level: DEBUG
    include-request-headers: true
    include-response-body: false
  health-check:
    include-database: true
    include-cache: true
    include-messaging: true

# Feature Flags: Enable all features for local development
features:
  rag-enabled: true
  intent-classification: true
  recommendations: true
  sentiment-analysis: false
  escalation-automation: false
  multilingual-support: false
  kb-auto-indexing: true

# Observability and metrics for local development
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
