app:
  environment: local

# Spring AI Ollama configuration (example)
spring:
  ai:
    ollama:
      url: "http://localhost:11434" # Ollama server URL
      model: "llama3"               # configured model name
      timeout: 10s

# Optional observability settings for AI
ai:
  max-prompt-tokens: 4000
  default-timeout-seconds: 10

