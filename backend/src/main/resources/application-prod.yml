app:
  environment: prod

# Production configuration must be provided via externalized configuration
# Use secrets manager, environment variables, or Kubernetes secrets
spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://postgres:5432/aichatbot}
    driver-class-name: org.postgresql.Driver
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
  data:
    mongodb:
      uri: ${MONGODB_URI}
  redis:
    host: ${REDIS_HOST}
    port: ${REDIS_PORT:6379}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
  # Spring AI Ollama configuration for production
  ai:
    ollama:
      url: ${OLLAMA_URL:http://ollama:11434}
      model: ${OLLAMA_MODEL:llama3}
      timeout: ${OLLAMA_TIMEOUT:30s}
      embedding-model: ${OLLAMA_EMBEDDING_MODEL:nomic-embed-text}
  # Enable Flyway migrations for production
  flyway:
    enabled: true

# Security: JWT configuration for production (must use strong secrets from vault/secrets manager)
security:
  jwt:
    secret: ${JWT_SECRET}
    expiration: ${JWT_EXPIRATION:3600}
    refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800}
    issuer: ${JWT_ISSUER:aichatbot}
    audience: ${JWT_AUDIENCE:aichatbot-users}

# RAG: Retrieval-Augmented Generation for production
rag:
  retrieval:
    enabled: ${RAG_ENABLED:true}
    top-k: ${RAG_TOP_K:5}
    similarity-threshold: ${RAG_SIMILARITY_THRESHOLD:0.5}
    chunk-size: ${RAG_CHUNK_SIZE:500}
    chunk-overlap: ${RAG_CHUNK_OVERLAP:100}
    vector-db: ${RAG_VECTOR_DB:pgvector}

# External Service Integrations for production
integrations:
  product-service:
    enabled: ${PRODUCT_SERVICE_ENABLED:true}
    base-url: ${PRODUCT_SERVICE_URL}
    timeout: ${PRODUCT_SERVICE_TIMEOUT:5s}
    api-key: ${PRODUCT_SERVICE_API_KEY}
  order-service:
    enabled: ${ORDER_SERVICE_ENABLED:true}
    base-url: ${ORDER_SERVICE_URL}
    timeout: ${ORDER_SERVICE_TIMEOUT:5s}
    api-key: ${ORDER_SERVICE_API_KEY}
  payment-service:
    enabled: ${PAYMENT_SERVICE_ENABLED:true}
    base-url: ${PAYMENT_SERVICE_URL}
    timeout: ${PAYMENT_SERVICE_TIMEOUT:10s}
    api-key: ${PAYMENT_SERVICE_API_KEY}
  shipping-service:
    enabled: ${SHIPPING_SERVICE_ENABLED:true}
    base-url: ${SHIPPING_SERVICE_URL}
    timeout: ${SHIPPING_SERVICE_TIMEOUT:5s}
    api-key: ${SHIPPING_SERVICE_API_KEY}
  crm-service:
    enabled: ${CRM_SERVICE_ENABLED:true}
    base-url: ${CRM_SERVICE_URL}
    timeout: ${CRM_SERVICE_TIMEOUT:5s}
    api-key: ${CRM_SERVICE_API_KEY}

# Database and Messaging: Production settings (optimized for throughput)
datasources:
  postgresql:
    pool-size: ${DB_POOL_SIZE:30}
    max-idle-time: ${DB_MAX_IDLE_TIME:30m}
    connection-timeout: ${DB_CONN_TIMEOUT:30s}
  mongodb:
    max-pool-size: ${MONGO_MAX_POOL_SIZE:100}
    connection-timeout: ${MONGO_CONN_TIMEOUT:10s}
  redis:
    timeout: ${REDIS_TIMEOUT:5s}
    pool-size: ${REDIS_POOL_SIZE:16}

messaging:
  kafka:
    producer-timeout: ${KAFKA_PRODUCER_TIMEOUT:10s}
    consumer-timeout: ${KAFKA_CONSUMER_TIMEOUT:30s}
    batch-size: ${KAFKA_BATCH_SIZE:32768}
    compression-type: ${KAFKA_COMPRESSION:snappy}
  rabbitmq:
    enabled: ${RABBITMQ_ENABLED:false}
    connection-timeout: ${RABBITMQ_CONN_TIMEOUT:10s}
    request-timeout: ${RABBITMQ_REQUEST_TIMEOUT:10s}

# Observability: Production (strict access, key metrics only)
observability:
  metrics:
    enabled: ${METRICS_ENABLED:true}
    include-jvm-metrics: ${INCLUDE_JVM_METRICS:true}
    include-system-metrics: ${INCLUDE_SYSTEM_METRICS:true}
    histogram-percentiles: ${HISTOGRAM_PERCENTILES:0.5,0.95,0.99}
  tracing:
    enabled: ${TRACING_ENABLED:true}
    sample-rate: ${TRACE_SAMPLE_RATE:0.01}
    exporter: ${TRACE_EXPORTER:jaeger}
  logging:
    level: ${LOG_LEVEL:WARN}
    include-request-headers: ${LOG_REQUEST_HEADERS:false}
    include-response-body: ${LOG_RESPONSE_BODY:false}
  health-check:
    include-database: ${HEALTH_CHECK_DB:true}
    include-cache: ${HEALTH_CHECK_CACHE:true}
    include-messaging: ${HEALTH_CHECK_MESSAGING:true}

# Feature Flags: Production features (stable only)
features:
  rag-enabled: ${FEATURE_RAG:true}
  intent-classification: ${FEATURE_INTENT_CLASSIFICATION:true}
  recommendations: ${FEATURE_RECOMMENDATIONS:true}
  sentiment-analysis: ${FEATURE_SENTIMENT_ANALYSIS:false}
  escalation-automation: ${FEATURE_AUTO_ESCALATION:false}
  multilingual-support: ${FEATURE_MULTILINGUAL:false}
  kb-auto-indexing: ${FEATURE_KB_AUTO_INDEX:true}

# Production observability: expose minimal endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: when-authorized

# Ensure production-ready settings: TLS, resource limits, and monitoring configured externally.
# Required environment variables for production (see docs for full list):
# DATABASE_URL, DATABASE_USERNAME, DATABASE_PASSWORD
# MONGODB_URI, REDIS_HOST, REDIS_PORT, KAFKA_BOOTSTRAP_SERVERS
# OLLAMA_URL, OLLAMA_MODEL, OLLAMA_TIMEOUT, OLLAMA_EMBEDDING_MODEL
# JWT_SECRET, JWT_EXPIRATION, JWT_REFRESH_EXPIRATION, JWT_ISSUER, JWT_AUDIENCE
# PRODUCT_SERVICE_URL, PRODUCT_SERVICE_API_KEY (+ order, payment, shipping, crm)
# DB_POOL_SIZE, MONGO_MAX_POOL_SIZE, REDIS_POOL_SIZE, KAFKA_BATCH_SIZE
# METRICS_ENABLED, TRACING_ENABLED, LOG_LEVEL, TRACE_SAMPLE_RATE
# FEATURE_RAG, FEATURE_INTENT_CLASSIFICATION, FEATURE_RECOMMENDATIONS, etc.
