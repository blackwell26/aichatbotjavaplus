app:
  environment: test

# Test configuration: for CI and integration tests using Testcontainers or test containers
spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/aichatbot_test
    driver-class-name: org.postgresql.Driver
    username: aichatbot
    password: changeme
  data:
    mongodb:
      uri: mongodb://localhost:27017/aichatbot_test
  redis:
    host: localhost
    port: 6379
  kafka:
    bootstrap-servers: localhost:9092
  # Spring AI Ollama configuration for tests (use mock or stub service)
  ai:
    ollama:
      url: "http://localhost:11434"
      model: "llama3"
      timeout: 5s
      embedding-model: "nomic-embed-text"
  # Enable Flyway for test database setup
  flyway:
    enabled: true

# Security: JWT configuration for tests (use fixed test values)
security:
  jwt:
    secret: test-secret-fixed-for-tests
    expiration: 3600
    refresh-expiration: 604800
    issuer: aichatbot-test
    audience: aichatbot-users

# RAG: Retrieval-Augmented Generation for tests (minimal settings)
rag:
  retrieval:
    enabled: true
    top-k: 3
    similarity-threshold: 0.5
    chunk-size: 500
    chunk-overlap: 100
    vector-db: pgvector

# External Service Integrations for tests (all disabled or mocked)
integrations:
  product-service:
    enabled: false
    base-url: "http://localhost:9001"
    timeout: 2s
    api-key: "test-key"
  order-service:
    enabled: false
    base-url: "http://localhost:9002"
    timeout: 2s
    api-key: "test-key"
  payment-service:
    enabled: false
    base-url: "http://localhost:9003"
    timeout: 2s
    api-key: "test-key"
  shipping-service:
    enabled: false
    base-url: "http://localhost:9004"
    timeout: 2s
    api-key: "test-key"
  crm-service:
    enabled: false
    base-url: "http://localhost:9005"
    timeout: 2s
    api-key: "test-key"

# Database and Messaging: Test settings (minimal pools for test isolation)
datasources:
  postgresql:
    pool-size: 2
    max-idle-time: 5m
    connection-timeout: 10s
  mongodb:
    max-pool-size: 5
    connection-timeout: 5s
  redis:
    timeout: 2s
    pool-size: 2

messaging:
  kafka:
    producer-timeout: 2s
    consumer-timeout: 5s
    batch-size: 8192
    compression-type: gzip
  rabbitmq:
    enabled: false

# Observability: Test (minimal, only errors logged)
observability:
  metrics:
    enabled: false
    include-jvm-metrics: false
    include-system-metrics: false
    histogram-percentiles: "0.5,0.95"
  tracing:
    enabled: false
    sample-rate: 0.0
    exporter: jaeger
  logging:
    level: WARN
    include-request-headers: false
    include-response-body: false
  health-check:
    include-database: true
    include-cache: false
    include-messaging: false

# Feature Flags: Only core features for tests
features:
  rag-enabled: true
  intent-classification: true
  recommendations: false
  sentiment-analysis: false
  escalation-automation: false
  multilingual-support: false
  kb-auto-indexing: false
