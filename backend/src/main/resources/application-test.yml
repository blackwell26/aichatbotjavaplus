app:
  environment: test

# Test configuration: for CI and integration tests using Testcontainers or test containers
spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/aichatbot_test
    driver-class-name: org.postgresql.Driver
    username: aichatbot
    password: changeme
  data:
    mongodb:
      uri: mongodb://localhost:27017/aichatbot_test
  redis:
    host: localhost
    port: 6379
  kafka:
    bootstrap-servers: localhost:9092
  # Spring AI Ollama configuration for tests (use mock or stub service)
  ai:
    ollama:
      url: "http://localhost:11434"
      model: "llama3"
      timeout: 5s
      embedding-model: "nomic-embed-text"
  # Enable Flyway for test database setup
  flyway:
    enabled: true

# Security: JWT configuration for tests (use fixed test values)
security:
  jwt:
    secret: test-secret-fixed-for-tests
    expiration: 3600
    refresh-expiration: 604800
    issuer: aichatbot-test
    audience: aichatbot-users

# RAG: Retrieval-Augmented Generation for tests (minimal settings)
rag:
  retrieval:
    enabled: true
    top-k: 3
    similarity-threshold: 0.5
    chunk-size: 500
    chunk-overlap: 100
    vector-db: pgvector
